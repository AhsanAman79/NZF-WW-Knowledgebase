services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      DATA_DIR: /app/backend/data
    volumes:
      - app_data:/app/backend/data
    # Only bound to localhost on the host (for debugging). Public access goes
    # through the shared Caddy (HTTPS + login) via the "edge" network.
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - default
      - edge
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - default

networks:
  default:
  edge:
    external: true
    name: eschborner-sportclub_default

volumes:
  app_data:
  ollama_data:
