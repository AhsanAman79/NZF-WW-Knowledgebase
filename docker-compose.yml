services:
  caddy:
    image: caddy:2.8
    restart: unless-stopped
    env_file: caddy.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
      - path: login.env
        required: false
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      DATA_DIR: /app/backend/data
    volumes:
      - app_data:/app/backend/data
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

volumes:
  app_data:
  ollama_data:
  caddy_data:
  caddy_config:
